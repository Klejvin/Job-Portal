{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <h3>A jeni i sigurt që dëshironi të fshini "{{ job.title }}"?</h3>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Po, fshije</button>
        <a href="{% url 'my_jobs' %}" class="btn btn-secondary">Anulo</a>
    </form>
</div>
{% endblock %}
