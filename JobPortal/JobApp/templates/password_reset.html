{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <h3 class="fw-bold">Harruat Fjalëkalimin?</h3>
            <p class="text-muted">Vendosni email-in tuaj më poshtë.</p>
            <form method="POST" class="card p-4 shadow-sm">
                {% csrf_token %}
                <input type="email" name="email" class="form-control mb-3" placeholder="Email-i juaj" required>
                <button type="submit" class="btn btn-primary w-100 py-2">Dërgo Linkun</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
