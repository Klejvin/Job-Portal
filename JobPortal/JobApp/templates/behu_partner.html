{% extends 'base.html' %}
{% load static %}
{% block title %} Behu Partner {% endblock %}
{% block content %}
<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
                    <h2 class="fw-bold mb-4 text-center">Bëhu Partner i JobPortal</h2>
                    
                    <form method="POST" enctype="multipart/form-data" id="partnerForm">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-bold">Emri i Kompanisë *</label>
                                <input type="text" name="emri_kompanise" class="form-control py-2" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Emër Mbiemër *</label>
                                <input type="text" name="emer_mbiemer" class="form-control py-2" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email Zyrtar *</label>
                                <input type="email" name="email" class="form-control py-2" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Logoja e Kompanisë </label>
                                <input type="file" name="logo" class="form-control" accept="image/*">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Përshkrim i shkurtër *</label>
                                <textarea name="pershkrimi" class="form-control" rows="4" required></textarea>
                            </div>
                            <div class="col-12 mt-4 text-center">
                                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" id="submitBtn">
                                    Dërgo Aplikimin
                                </button>
                                <div class="spinner-border text-primary d-none mt-3" id="loader" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // Script i thjeshtë për të treguar loading kur dërgohet email-i
    document.getElementById('partnerForm').onsubmit = function() {
        document.getElementById('submitBtn').classList.add('d-none');
        document.getElementById('loader').classList.remove('d-none');
    };
</script>
{% endblock %}
